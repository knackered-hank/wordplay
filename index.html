<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>韓哥填字遊戲</title>
    <style>
        :root { --bg-color: #fdfaf0; --primary: #e07a5f; --grid-bg: #333; }
        body { 
            font-family: "Microsoft JhengHei", sans-serif; 
            background-color: var(--bg-color); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 40px 20px; /* 增加頂部間距 */
        }
        
        /* 放大容器寬度 */
        .menu-container { 
            max-width: 1000px; 
            width: 100%; 
            text-align: center; 
            margin-top: 30px; 
        }

        h1 { 
            font-size: 42px; /* 標題放大 */
            color: #3d405b;
            margin-bottom: 10px;
        }

        p { 
            font-size: 20px; /* 說明文字放大 */
            color: #666;
        }

        hr {
            border: 0;
            height: 2px;
            background: #eee;
            margin: 30px 0;
        }
        
        /* 調整網格，增加間隙 */
        .level-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 25px; /* 間隙放大 */
            margin-top: 40px;
        }

        /* 放大關卡卡片尺寸 */
        .level-card { 
            background: white; 
            padding: 40px 15px; /* 高度增加 */
            border-radius: 16px; 
            box-shadow: 0 6px 15px rgba(0,0,0,0.06); 
            cursor: pointer; 
            transition: all 0.25s ease; 
            text-decoration: none; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            color: inherit; 
            border: 2px solid transparent; /* 增加邊框粗細感 */
        }
        
        /* 懸停效果增強 */
        .level-card:hover { 
            transform: translateY(-8px); 
            border: 2px solid var(--primary); 
            box-shadow: 0 12px 24px rgba(224, 122, 95, 0.15);
        }

        /* 關卡數字放大 */
        .level-card h2 { 
            margin: 0; 
            color: #3d405b; 
            font-size: 2rem; /* 數字變大 */
            font-weight: bold;
        }

        /* 手機版適應 */
        @media (max-width: 768px) {
            .level-grid { grid-template-columns: repeat(3, 1fr); gap: 15px; }
            h1 { font-size: 32px; }
        }

        .footer { 
            margin-top: 100px; 
            font-size: 14px; 
            color: #888; 
            text-align: center; 
            padding-bottom: 50px;
        }
    </style>
</head>
<body>

    <div class="menu-container">
        <h1>韓哥填字遊戲</h1>
        <p>請選擇挑戰關卡：</p>
        <hr>
        <div id="levelGrid" class="level-grid"></div>
    </div>

    <div class="footer">◎2026 韓哥填字遊戲</div>

<script>
    // 目前到第 11 關
    const totalLevels = 11; 

    function toChinese(n) {
        const units = ["", "一", "二", "三", "四", "五", "六", "七", "八", "九"];
        if (n === 10) return "十";
        if (n < 10) return units[n];
        
        const tens = Math.floor(n / 10); 
        const digit = n % 10;   
        
        let result = "";
        result += (tens === 1) ? "十" : units[tens] + "十";
        result += units[digit];
        
        return result;
    }

    const grid = document.getElementById('levelGrid');
    for (let i = 1; i <= totalLevels; i++) {
        const issueId = String(i).padStart(3, '0'); 
        
        const card = document.createElement('a');
        card.href = `gameset.html?issue=${issueId}`;
        card.className = 'level-card';
        card.innerHTML = `<h2>${toChinese(i)}</h2>`;
        
        grid.appendChild(card);
    }
</script>

</body>
</html>
