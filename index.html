<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>韓哥填字遊戲</title>
    <style>
        :root { --bg-color: #fdfaf0; --primary: #e07a5f; --grid-bg: #333; }
        body { font-family: "Microsoft JhengHei", sans-serif; background-color: var(--bg-color); display: flex; flex-direction: column; align-items: center; padding: 20px; }
        
        .menu-container { max-width: 800px; width: 100%; text-align: center; margin-top: 50px; }
        
        .level-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 15px;
            margin-top: 30px;
        }

        .level-card { 
            background: white; 
            padding: 25px 10px; 
            border-radius: 12px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); 
            cursor: pointer; 
            transition: transform 0.2s, border 0.2s; 
            text-decoration: none; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            color: inherit; 
            border: 1px solid transparent;
        }
        
        .level-card:hover { transform: translateY(-3px); border: 1px solid var(--primary); }
        .level-card h2 { margin: 0; color: #3d405b; font-size: 1.2rem; }

        /* 手機版 */
        @media (max-width: 600px) {
            .level-grid { grid-template-columns: repeat(3, 1fr); }
        }
    </style>
</head>
<body>

    <div class="menu-container">
        <h1>韓哥填字遊戲</h1>
        <p>請選擇挑戰關卡：</p>
        <hr>
        <div id="levelGrid" class="level-grid"></div>
    </div>

    <div style="margin-top: 80px; font-size: 12px; color: #888; text-align: center;">◎2026 韓哥填字遊戲</div>

<script>
    const totalLevels = 11; 

    function toChinese(n) {
        const units = ["", "一", "二", "三", "四", "五", "六", "七", "八", "九"];
        if (n === 10) return "十";
        if (n < 10) return units[n];
        
        const tens = Math.floor(n / 10); 
        const digit = n % 10;   
        
        let result = "";
        result += (tens === 1) ? "十" : units[tens] + "十";
        result += units[digit];
        
        return result;
    }

    const grid = document.getElementById('levelGrid');
    for (let i = 1; i <= totalLevels; i++) {
        const issueId = String(i).padStart(3, '0'); 
        
        const card = document.createElement('a');
        card.href = `gameset.html?issue=${issueId}`;
        card.className = 'level-card';
        card.innerHTML = `<h2>${toChinese(i)}</h2>`;
        
        grid.appendChild(card);
    }
</script>

</body>
</html>
