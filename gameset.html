<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=no">
    <title id="page-title">韓哥填字遊戲</title>
    <style>
        :root { --bg-color: #f4f1de; --primary: #e07a5f; --secondary: #3d405b; --green: #2d6a4f; }
        
        body {
            font-family: "Microsoft JhengHei", sans-serif;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0;
            margin: 0;
            height: 100vh;
            width: 100vw;
            overflow: hidden; /* 徹底禁止捲動 */
        }

        /* 期數文字：放大並維持置中 */
        h1 { 
            color: var(--secondary); 
            margin: 10px 0 5px 0; 
            font-size: 28px; /* 放大字體 */
            font-weight: 900;
            text-align: center; 
        }

        /* 提示鈕：移至右上角以節省垂直空間 */
        #clue-trigger {
            display: none; /* 電腦版隱藏 */
            position: absolute;
            top: 10px;
            right: 10px;
            background: var(--secondary);
            color: white;
            padding: 6px 12px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
            z-index: 1000;
            font-size: 13px;
        }

        .game-wrapper { 
            display: flex; gap: 30px; align-items: flex-start; justify-content: center; 
            max-width: 1400px; width: 100%; flex: 1;
        }

        .left-column { 
            display: flex; flex-direction: column; align-items: center; 
            width: 100%;
        }

        /* 棋盤邊框與內距優化 */
        #grid { 
            display: grid; 
            border: 8px solid #333; 
            background-color: #333; 
            padding: 2px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .cell { width: 55px; height: 55px; position: relative; box-sizing: border-box; background-color: #333; }
        .white-cell { background-color: white; border: 1px solid #ccc; cursor: pointer; }
        .selected { background-color: #f2cc8f !important; box-shadow: inset 0 0 0 4px var(--primary); z-index: 5; }
        .wrong-flash { background-color: #f8d7da !important; box-shadow: inset 0 0 0 4px #dc3545 !important; }
        .cell-text { color: var(--green); pointer-events: none; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: bold; }
        .num-label { position: absolute; top: 2px; left: 4px; font-size: 11px; color: #666; font-weight: bold; pointer-events: none; }

        /* 輸入區域佈局校正 */
        .input-area { 
            width: 94%; 
            max-width: 580px; 
            background: #fff; padding: 8px; 
            border-radius: 12px; display: flex; gap: 8px; 
            border: 2px solid var(--secondary); 
            box-sizing: border-box;
        }
        #mainInput { flex: 1; font-size: 16px; padding: 8px; text-align: center; border: 1px solid #ccc; border-radius: 6px; outline: none; }

        button { padding: 8px 10px; cursor: pointer; border: none; border-radius: 6px; font-weight: bold; color: white; white-space: nowrap; font-size: 14px;}
        .btn-check { background: var(--green); }
        .btn-hint { background: #f4d35e; color: var(--secondary); border: 1px solid #d1b44c; }
        .btn-clear-one { background: #ffffff; color: var(--secondary); border: 1px solid #ccc; }
        .btn-reset { background: var(--primary); }

        .back-link { margin-top: 5px; text-decoration: none; color: var(--secondary); font-size: 13px; font-weight: bold; }
        footer { margin: 5px 0 10px 0; font-size: 11px; color: #888; text-align: center; }

        /* --- 手機版：全畫面強制壓縮 --- */
        @media (max-width: 900px) {
            #clue-trigger { display: block; } /* 顯示右上角按鈕 */
            .game-wrapper { flex-direction: column; align-items: center; gap: 0; }
            
            #grid { 
                transform: scale(0.8); 
                transform-origin: top center; 
                margin-top: 5px;
                margin-bottom: -95px; /* 吸附下方組件 */
            }

            .input-area { width: 94vw; flex-wrap: wrap; justify-content: center; padding: 5px; }
            #mainInput { width: 100%; margin-bottom: 5px; height: 36px; }

            /* 彈窗式提示盒 */
            .clue-box {
                display: none; position: fixed; top: 50%; left: 50%;
                transform: translate(-50%, -50%); width: 92vw; height: 70vh; z-index: 1001;
                background: white; border-radius: 15px; padding: 20px; overflow-y: auto;
            }
            .clue-box.active { display: block; }
            #overlay {
                display: none; position: fixed; top: 0; left: 0; 
                width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1000;
            }
            #overlay.active { display: block; }
        }

        @media (max-width: 380px) {
            h1 { font-size: 24px; }
            #grid { transform: scale(0.68); margin-bottom: -120px; }
        }
    </style>
</head>
<body onclick="closeClues(event)">

    <h1 id="game-title" onclick="handleTitleClick()">載入中...</h1>

    <div id="clue-trigger" onclick="toggleClues(event)">🔍 提示</div>

    <div id="overlay"></div>

    <div class="game-wrapper">
        <div class="left-column">
            <div id="grid"></div>
            <div class="input-area">
                <input type="text" id="mainInput" placeholder="點擊格子後在此輸入" autocomplete="off">
                <button class="btn-check" onclick="checkAnswers()">檢查</button>
                <button class="btn-hint" id="hintBtn" onclick="revealHint()">💡 <span id="hintCount">5</span></button>
                <button class="btn-clear-one" onclick="clearCurrentCell()">🗑️</button>
                <button class="btn-reset" onclick="location.reload()">清空</button>
            </div>
            <a href="index.html" class="back-link">← 返回選單</a>
            <footer>◎2026 韓哥填字</footer>
        </div>

        <div class="clue-box" id="clueBox">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                <h2 style="color:var(--secondary); margin:0;">題目提示</h2>
                <span id="close-x" style="cursor:pointer; font-size:24px; color:#999;" onclick="toggleClues(event)">✕</span>
            </div>
            <div id="across-clues-wrapper">
                <h3 style="color:var(--primary); border-bottom: 2px solid #eee; padding-bottom: 5px;">橫行提示</h3>
                <div id="across-clues"></div>
            </div>
            <div id="down-clues-wrapper">
                <h3 style="color:var(--primary); border-bottom: 2px solid #eee; padding-bottom: 5px; margin-top:15px;">直行提示</h3>
                <div id="down-clues"></div>
            </div>
        </div>
    </div>

<script>
    // 腳本保持原樣，確保邏輯運作正常
    const urlParams = new URLSearchParams(window.location.search);
    const issueId = urlParams.get('issue') || '001';
    let solutions = {}, labels = {}, size = 10, currentCell = null, titleClickCount = 0;
    let isComposing = false, startTime = Date.now(), gameFinished = false, hintsRemaining = 5;

    function toggleClues(e) {
        if(e) e.stopPropagation();
        const box = document.getElementById('clueBox');
        const overlay = document.getElementById('overlay');
        box.classList.toggle('active');
        overlay.classList.toggle('active');
    }

    function closeClues(e) {
        const box = document.getElementById('clueBox');
        if(box.classList.contains('active') && !box.contains(e.target)) toggleClues();
    }

    const issueNum = parseInt(issueId);
    const startRange = Math.floor((issueNum - 1) / 10) * 10 + 1;
    const endRange = startRange + 9;
    const folder = `${String(startRange).padStart(3, '0')}-${String(endRange).padStart(3, '0')}`;
    const targetUrl = `./puzzles/${folder}/${issueId}.json`;

    fetch(targetUrl)
        .then(res => res.text())
        .then(encodedData => {
            const reversedData = encodedData.trim().split("").reverse().join("");
            const decodedData = decodeURIComponent(Array.prototype.map.call(atob(reversedData), function(c) {
                return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
            }).join(''));
            const data = JSON.parse(decodedData);
            document.getElementById('game-title').innerText = data.name;
            size = data.size || 10;
            data.cells.forEach(c => {
                const key = `${c.r},${c.c}`;
                solutions[key] = c.ans;
                if (c.label) labels[key] = String(c.label);
            });
            initGrid();
            renderClues("across-clues", data.clues.across);
            renderClues("down-clues", data.clues.down);
        });

    function initGrid() {
        const grid = document.getElementById('grid');
        grid.style.gridTemplateColumns = `repeat(${size}, 55px)`;
        grid.innerHTML = "";
        for (let r = 1; r <= size; r++) {
            for (let c = 1; c <= size; c++) {
                const key = `${r},${c}`;
                const cell = document.createElement('div');
                cell.className = 'cell ' + (solutions[key] ? 'white-cell' : 'black-cell');
                cell.id = `cell-${r}-${c}`;
                if (solutions[key]) {
                    if (labels[key]) {
                        const lbl = document.createElement('span');
                        lbl.className = 'num-label';
                        lbl.innerText = labels[key];
                        cell.appendChild(lbl);
                    }
                    const txt = document.createElement('div');
                    txt.className = 'cell-text';
                    txt.id = `text-${r}-${c}`;
                    cell.appendChild(txt);
                    cell.onclick = (e) => { e.stopPropagation(); selectCell(r, c); };
                }
                grid.appendChild(cell);
            }
        }
    }

    function selectCell(r, c) {
        if (!solutions[`${r},${c}`]) return;
        if (currentCell) document.getElementById(`cell-${currentCell.r}-${currentCell.c}`).classList.remove('selected');
        currentCell = { r, c };
        document.getElementById(`cell-${r}-${c}`).classList.add('selected');
        const input = document.getElementById('mainInput');
        input.value = "";
        input.focus();
    }

    const inputField = document.getElementById('mainInput');
    inputField.addEventListener('compositionstart', () => { isComposing = true; });
    inputField.addEventListener('compositionend', (e) => { isComposing = false; fillChar(e.data); });
    inputField.addEventListener('input', (e) => { if (!isComposing && e.inputType !== 'deleteContentBackward') fillChar(inputField.value); });

    function fillChar(val) {
        if (!currentCell || !val) return;
        const lastChar = val.trim().slice(-1);
        if (lastChar) {
            document.getElementById(`text-${currentCell.r}-${currentCell.c}`).innerText = lastChar;
            inputField.value = "";
        }
    }

    function checkAnswers() {
        if (gameFinished) return;
        let totalCells = Object.keys(solutions).length, filledCount = 0, allCorrect = true, hasWrong = false;
        for (let key in solutions) {
            const [r, c] = key.split(',');
            const cell = document.getElementById(`cell-${r}-${c}`);
            const userAns = document.getElementById(`text-${r}-${c}`).innerText.trim();
            if (userAns !== "") filledCount++; 
            if (userAns !== solutions[key]) {
                allCorrect = false;
                if (userAns !== "") { hasWrong = true; cell.classList.add('wrong-flash'); setTimeout(() => { cell.classList.remove('wrong-flash'); }, 1500); }
            }
        }
        if (allCorrect) {
            gameFinished = true;
            const diff = Math.floor((Date.now() - startTime) / 1000);
            alert(`恭喜通關！🎉\n挑戰耗時：${Math.floor(diff/60)}分${diff%60}秒`);
        } else {
            const threshold = Math.ceil(totalCells / 2);
            let message = filledCount >= threshold ? "帥喔，快搞定了！" : "加油，再接再厲！";
            alert(`${message}\n進度：${filledCount} / ${totalCells}${hasWrong ? "\n(有填錯的字喔)" : ""}`);
        }
    }

    function revealHint() {
        if (!currentCell || gameFinished || hintsRemaining <= 0) return;
        const key = `${currentCell.r},${currentCell.c}`;
        if (document.getElementById(`text-${currentCell.r}-${currentCell.c}`).innerText === solutions[key]) return;
        document.getElementById(`text-${currentCell.r}-${currentCell.c}`).innerText = solutions[key];
        hintsRemaining--;
        document.getElementById('hintCount').innerText = hintsRemaining;
    }

    function renderClues(id, clues) {
        const container = document.getElementById(id);
        container.innerHTML = "";
        clues.forEach(clue => {
            const div = document.createElement("div");
            div.className = "clue-item";
            div.style.cssText = "margin-bottom:10px; font-size:15px; border-bottom:1px solid #eee; padding:5px;";
            div.innerHTML = `<span style="font-weight:bold; color:var(--primary); margin-right:8px;">${clue.num}</span>${clue.text}`;
            div.onclick = (e) => {
                e.stopPropagation();
                for (let key in labels) {
                    let isMatch = false;
                    if (!isNaN(clue.num)) {
                        const regex = new RegExp(`(^|[^0-9])${clue.num}([^0-9]|$)`);
                        isMatch = regex.test(labels[key]);
                    } else { isMatch = labels[key].includes(clue.num); }
                    if (isMatch) { 
                        const [r, c] = key.split(",").map(Number); 
                        selectCell(r, c); 
                        toggleClues();
                        break; 
                    }
                }
            };
            container.appendChild(div);
        });
    }

    function clearCurrentCell() { if (currentCell) document.getElementById(`text-${currentCell.r}-${currentCell.c}`).innerText = ""; }
    function handleTitleClick() {
        titleClickCount++;
        if (titleClickCount >= 3) {
            for (let key in solutions) {
                const [r, c] = key.split(',');
                document.getElementById(`text-${r}-${c}`).innerText = solutions[key];
            }
            titleClickCount = 0;
        }
    }
</script>
</body>
</html>
