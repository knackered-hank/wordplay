<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=no">
    <title id="page-title">韓哥填字遊戲</title>
    <style>
        :root { --bg-color: #f4f1de; --primary: #e07a5f; --secondary: #3d405b; --green: #2d6a4f; }
        
        html, body {
            overflow-x: hidden; /* 絕對禁止左右滑動 */
            width: 100vw;
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
        }

        body {
            font-family: "Microsoft JhengHei", sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #floating-input-container { position: absolute; display: none; z-index: 3000; }
        #hidden-input {
            width: 50px; height: 50px; font-size: 24px; text-align: center;
            border: 3px solid var(--primary); border-radius: 8px;
            background: white; box-shadow: 0 4px 15px rgba(0,0,0,0.3); outline: none;
        }

        .header-area {
            display: flex; justify-content: center; align-items: center;
            width: 100%; max-width: 1100px; position: relative;
            padding: 20px 0;
        }
        h1 { color: var(--secondary); margin: 0; font-size: 1.8rem; font-weight: 900; }
        #clue-trigger { display: none; }

        /* 電腦版佈局 */
        .game-wrapper { 
            display: flex; flex-direction: row; gap: 30px;
            align-items: flex-start; justify-content: center;
            width: 100%; max-width: 1150px;
        }

        .left-column { 
            display: flex; flex-direction: column; align-items: center;
        }

        #grid { 
            display: grid; border: 8px solid #333; background-color: #333; padding: 2px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
        }
        .cell { width: 55px; height: 55px; position: relative; box-sizing: border-box; background-color: #333; }
        .white-cell { background-color: white; border: 1px solid #ccc; cursor: pointer; }
        .selected { background-color: #f2cc8f !important; box-shadow: inset 0 0 0 4px var(--primary); z-index: 5; }
        .cell-text { color: var(--green); pointer-events: none; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: bold; }
        .num-label { position: absolute; top: 2px; left: 4px; font-size: 11px; color: #666; font-weight: bold; }

        .input-area { 
            width: 100%; max-width: 600px; background: #fff; padding: 15px; 
            border-radius: 12px; display: flex; gap: 10px; border: 2px solid var(--secondary); 
            margin: 25px 0; box-sizing: border-box;
        }
        #mainInput { flex: 1; font-size: 18px; padding: 10px; text-align: center; border: 1px solid #ccc; border-radius: 6px; outline: none; }

        button { padding: 10px 18px; cursor: pointer; border: none; border-radius: 6px; font-weight: bold; color: white; }
        .btn-check { background: var(--green); }
        .btn-hint { background: #f4d35e; color: var(--secondary); }
        .btn-clear-one { background: #ffffff; color: var(--secondary); border: 1px solid #ccc; }
        .btn-reset { background: var(--primary); }

        .clue-box { 
            flex: 0 1 400px; background: white; padding: 25px; border-radius: 15px; 
            max-height: 80vh; overflow-y: auto; border-top: 6px solid var(--primary); 
            box-shadow: 0 4px 20px rgba(0,0,0,0.1); box-sizing: border-box;
        }

        .back-link { text-decoration: none; color: var(--secondary); font-weight: bold; margin-bottom: 20px; }
        footer { padding-bottom: 30px; font-size: 12px; color: #888; }

        /* --- 手機版修正：解決右偏與自動填滿 --- */
        @media (max-width: 1000px) {
            .header-area { width: 100vw; padding: 15px 0; }
            #clue-trigger { 
                display: block; position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
                background: var(--secondary); color: white; padding: 6px 14px; border-radius: 20px; font-size: 13px;
            }
            
            /* 強制容器寬度為 100% 避免右偏移 */
            .game-wrapper { flex-direction: column; width: 100vw; align-items: center; gap: 0; }
            .left-column { width: 100vw; align-items: center; overflow: visible; }

            /* 核心：自動計算縮放與邊距以達成絕對置中 */
            #grid { 
                --zoom: min(0.88, 92vw / 570px); /* 570px 是棋盤原始寬度 */
                transform: scale(var(--zoom));
                transform-origin: top left;
                /* 關鍵計算：(螢幕寬度 - (棋盤寬度 * 縮放比例)) / 2 */
                margin-left: calc((100vw - (570px * var(--zoom))) / 2); 
                margin-bottom: calc(-570px * (1 - var(--zoom)) + 20px); 
            }

            #mainInput { display: none; }
            .input-area { width: 90vw; margin: 10px auto; padding: 10px; }
            
            .clue-box {
                display: none; position: fixed; top: 50%; left: 50%;
                transform: translate(-50%, -50%); width: 90vw; height: 75vh; z-index: 2501;
            }
            .clue-box.active { display: block; }
            #overlay {
                display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
                background: rgba(0,0,0,0.7); z-index: 2500;
            }
            #overlay.active { display: block; }
            #close-x { display: block !important; }
        }
    </style>
</head>
<body onclick="handleGlobalClick(event)">

    <div id="floating-input-container">
        <input type="text" id="hidden-input" maxlength="1" autocomplete="off">
    </div>

    <div class="header-area">
        <h1 id="game-title">載入中...</h1>
        <div id="clue-trigger" onclick="toggleClues(event)">🔍 提示區</div>
    </div>

    <div id="overlay" onclick="toggleClues(event)"></div>

    <div class="game-wrapper">
        <div class="left-column">
            <div id="grid"></div>
            <div class="input-area">
                <input type="text" id="mainInput" placeholder="點擊格子後在此輸入">
                <button class="btn-check" onclick="checkAnswers()">檢查</button>
                <button class="btn-hint" onclick="revealHint()">💡 <span id="hintCount">5</span></button>
                <button class="btn-clear-one" onclick="clearCurrentCell()">🗑️</button>
                <button class="btn-reset" onclick="location.reload()">清空</button>
            </div>
            <a href="index.html" class="back-link">← 返回選單</a>
            <footer>◎2026 韓哥填字</footer>
        </div>

        <div class="clue-box" id="clueBox">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                <h2 style="color:var(--secondary); margin:0;">題目提示</h2>
                <span id="close-x" style="display:none; cursor:pointer; font-size:32px; color:#999;" onclick="toggleClues(event)">✕</span>
            </div>
            <h3 style="color:var(--primary); border-bottom: 2px solid #eee; padding-bottom: 5px;">橫行提示</h3>
            <div id="across-clues"></div>
            <h3 style="color:var(--primary); border-bottom: 2px solid #eee; padding-bottom: 5px; margin-top:20px;">直行提示</h3>
            <div id="down-clues"></div>
        </div>
    </div>

<script>
    // 此處腳本邏輯保持不變，維持你的資料載入、格子點擊與輸入功能
    const urlParams = new URLSearchParams(window.location.search);
    const issueId = urlParams.get('issue') || '001';
    let solutions = {}, labels = {}, size = 10, currentCell = null;
    let hintsRemaining = 5;

    const floatingContainer = document.getElementById('floating-input-container');
    const hiddenInput = document.getElementById('hidden-input');

    function handleGlobalClick(e) {
        if (!e.target.classList.contains('white-cell') && e.target !== hiddenInput) {
            floatingContainer.style.display = 'none';
        }
    }

    function toggleClues(e) {
        if(e) e.stopPropagation();
        const box = document.getElementById('clueBox');
        const overlay = document.getElementById('overlay');
        const isActive = box.classList.toggle('active');
        overlay.classList.toggle('active');
        document.body.style.overflow = isActive ? 'hidden' : 'auto';
    }

    fetch(`./puzzles/001-010/${issueId}.json`)
    .then(res => res.text())
    .then(encodedData => {
        const reversedData = encodedData.trim().split("").reverse().join("");
        const decodedData = decodeURIComponent(Array.prototype.map.call(atob(reversedData), function(c) {
            return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
        }).join(''));
        const data = JSON.parse(decodedData);
        document.getElementById('page-title').innerText = data.name + " - 韓哥填字";
        document.getElementById('game-title').innerText = data.name;
        size = data.size || 10;
        data.cells.forEach(c => {
            solutions[`${c.r},${c.c}`] = c.ans;
            if (c.label) labels[`${c.r},${c.c}`] = String(c.label);
        });
        initGrid();
        renderClues("across-clues", data.clues.across);
        renderClues("down-clues", data.clues.down);
    });

    function initGrid() {
        const grid = document.getElementById('grid');
        grid.style.gridTemplateColumns = `repeat(${size}, 55px)`;
        grid.innerHTML = "";
        for (let r = 1; r <= size; r++) {
            for (let c = 1; c <= size; c++) {
                const key = `${r},${c}`;
                const cell = document.createElement('div');
                cell.className = 'cell ' + (solutions[key] ? 'white-cell' : 'black-cell');
                cell.id = `cell-${r}-${c}`;
                if (solutions[key]) {
                    if (labels[key]) {
                        const lbl = document.createElement('span');
                        lbl.className = 'num-label';
                        lbl.innerText = labels[key];
                        cell.appendChild(lbl);
                    }
                    const txt = document.createElement('div');
                    txt.className = 'cell-text';
                    txt.id = `text-${r}-${c}`;
                    cell.appendChild(txt);
                    cell.onclick = (e) => { e.stopPropagation(); selectCell(r, c); };
                }
                grid.appendChild(cell);
            }
        }
    }

    function selectCell(r, c) {
        if (!solutions[`${r},${c}`]) return;
        if (currentCell) document.getElementById(`cell-${currentCell.r}-${currentCell.c}`).classList.remove('selected');
        currentCell = { r, c };
        const targetCell = document.getElementById(`cell-${r}-${c}`);
        targetCell.classList.add('selected');

        const rect = targetCell.getBoundingClientRect();
        if (window.innerWidth <= 1000) {
            floatingContainer.style.display = 'block';
            floatingContainer.style.left = `${rect.left + (rect.width / 2) - 25}px`;
            floatingContainer.style.top = `${rect.top + window.scrollY - 65}px`;
            hiddenInput.value = "";
            hiddenInput.focus();
        } else {
            const input = document.getElementById('mainInput');
            input.value = "";
            input.focus();
        }
    }

    function fillChar(val) {
        if (!currentCell || !val) return;
        const lastChar = val.trim().slice(-1);
        if (lastChar) {
            document.getElementById(`text-${currentCell.r}-${currentCell.c}`).innerText = lastChar;
        }
    }

    hiddenInput.addEventListener('input', () => {
        fillChar(hiddenInput.value);
        if (hiddenInput.value) {
            setTimeout(() => { floatingContainer.style.display = 'none'; }, 300);
        }
    });

    document.getElementById('mainInput').addEventListener('input', (e) => {
        fillChar(e.target.value);
        e.target.value = "";
    });

    function checkAnswers() {
        let allCorrect = true, filled = 0;
        for (let key in solutions) {
            const userAns = document.getElementById(`text-${key.replace(',','-')}`).innerText.trim();
            if (userAns !== "") filled++;
            if (userAns !== solutions[key]) allCorrect = false;
        }
        alert(allCorrect ? "帥喔，快搞定了！" : `加油！已填寫 ${filled} 格`);
    }

    function revealHint() {
        if (!currentCell || hintsRemaining <= 0) return;
        const key = `${currentCell.r},${currentCell.c}`;
        document.getElementById(`text-${currentCell.r}-${currentCell.c}`).innerText = solutions[key];
        hintsRemaining--;
        document.getElementById('hintCount').innerText = hintsRemaining;
    }

    function renderClues(id, clues) {
        const container = document.getElementById(id);
        clues.forEach(clue => {
            const div = document.createElement("div");
            div.style.cssText = "margin-bottom:12px; font-size:16px; cursor:pointer; line-height:1.4;";
            div.innerHTML = `<span style="font-weight:bold; color:var(--primary); margin-right:8px;">${clue.num}</span>${clue.text}`;
            div.onclick = () => {
                for (let key in labels) {
                    if (labels[key] === String(clue.num)) {
                        const [r, c] = key.split(",").map(Number);
                        selectCell(r, c);
                        if(window.innerWidth <= 1000) toggleClues();
                        break;
                    }
                }
            };
            container.appendChild(div);
        });
    }

    function clearCurrentCell() { if (currentCell) document.getElementById(`text-${currentCell.r}-${currentCell.c}`).innerText = ""; }
</script>
</body>
</html>
